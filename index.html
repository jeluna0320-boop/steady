<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#11150f">
<meta name="apple-mobile-web-app-title" content="Steady">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Steady</title>
<style>
  :root{
    --bg:#11150f; --panel:#1b2118; --panel-2:#222a1e; --line:#2f3a28;
    --ink:#eef2e6; --ink-dim:#9aa68c; --ink-faint:#6f7a63;
    --moss:#9fc24f; --moss-deep:#6f8f33; --clay:#d98a55; --sky:#7fb0c4;
    --radius:18px; --shadow:0 1px 0 rgba(255,255,255,.03), 0 14px 40px -18px rgba(0,0,0,.7);
    font-size:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
  body{padding-bottom:96px}
  .wrap{max-width:540px;margin:0 auto;padding:0 18px}
  h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.02em}
  .display{font-family:"SF Pro Display",-apple-system,system-ui,sans-serif;font-weight:700;letter-spacing:-.03em}
  .eyebrow{font-size:.70rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:650}
  .dim{color:var(--ink-dim)} .faint{color:var(--ink-faint)}
  .tiny{font-size:.78rem;line-height:1.45} .sm{font-size:.86rem}
  header{padding:max(20px,env(safe-area-inset-top)) 0 10px;position:sticky;top:0;
    background:linear-gradient(var(--bg) 72%,transparent);z-index:30}
  .brandrow{display:flex;align-items:baseline;justify-content:space-between}
  .brand{font-size:1.35rem}.brand .leaf{color:var(--moss)}
  .datechip{font-size:.74rem;color:var(--ink-dim);font-variant-numeric:tabular-nums}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:12px 0;box-shadow:var(--shadow)}
  .card-tight{padding:13px 15px}
  .row{display:flex;align-items:center;gap:12px}.between{justify-content:space-between}.grow{flex:1;min-width:0}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--moss);color:#16210a;
    font-weight:680;font-size:.95rem;padding:13px 16px;border-radius:13px;width:100%;transition:transform .08s,filter .15s}
  .btn:active{transform:scale(.975)} .btn.ghost{background:var(--panel-2);color:var(--ink);border:1px solid var(--line)}
  .btn.mini{width:auto;padding:9px 14px;font-size:.85rem;border-radius:11px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:999px;background:var(--panel-2);
    border:1px solid var(--line);font-size:.84rem;color:var(--ink-dim);font-weight:600;transition:.12s}
  .chip.on{background:var(--moss);color:#16210a;border-color:transparent}.chip:active{transform:scale(.95)}
  .dial-wrap{display:flex;align-items:center;gap:18px}
  .dial{position:relative;width:108px;height:108px;flex:none}.dial svg{transform:rotate(-90deg)}
  .dial .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .dial .num b{font-size:1.7rem;font-weight:720;letter-spacing:-.03em;line-height:1}
  .dial .num span{font-size:.62rem;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
  nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(20,25,17,.82);backdrop-filter:blur(18px);
    border-top:1px solid var(--line);padding:8px 0 max(10px,env(safe-area-inset-bottom))}
  .navin{max-width:540px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr)}
  .nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;color:var(--ink-faint);font-size:.62rem;font-weight:650}
  .nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7}.nav-btn.on{color:var(--moss)}
  .view{display:none;animation:fade .22s ease}.view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .ex{border-top:1px solid var(--line);padding:14px 0}.ex:first-of-type{border-top:none}
  .ex h3{font-size:1rem;margin-bottom:2px}.ex .meta{font-size:.78rem;color:var(--ink-dim)}
  .setgrid{display:flex;flex-direction:column;gap:7px;margin-top:11px}
  .setline{display:flex;align-items:center;gap:8px}
  .setline .lbl{width:42px;font-size:.72rem;color:var(--ink-faint);font-weight:650}
  .ipt{flex:1;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);
    text-align:center;font-size:.95rem;font-weight:650;font-variant-numeric:tabular-nums;min-width:0}
  .ipt:focus{outline:2px solid var(--moss-deep);border-color:transparent}
  .ipt::placeholder{color:var(--ink-faint);font-weight:500}
  .unit{font-size:.72rem;color:var(--ink-faint);width:30px}
  .badge{font-size:.64rem;padding:3px 8px;border-radius:999px;font-weight:680;letter-spacing:.04em;text-transform:uppercase}
  .badge.knee{background:rgba(217,138,85,.16);color:var(--clay)}
  .badge.core{background:rgba(159,194,79,.14);color:var(--moss)}
  .badge.push{background:rgba(127,176,196,.16);color:var(--sky)}
  .badge.pull{background:rgba(127,176,196,.16);color:var(--sky)}
  .coach{margin-top:11px;border-top:1px dashed var(--line);padding-top:11px;display:none}
  .coach.open{display:block}
  .coach .crow{display:flex;gap:9px;padding:5px 0;font-size:.8rem;line-height:1.4}
  .coach .ck{flex:none;width:74px;color:var(--ink-faint);font-weight:650;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;padding-top:1px}
  .coach .cv{color:var(--ink-dim)}
  .lastbar{margin-top:10px;background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:9px 11px;font-size:.78rem}
  .lastbar b{color:var(--ink)}
  .nudge{color:var(--moss);font-weight:640;margin-top:3px;display:block}
  .coachtoggle{font-size:.74rem;color:var(--moss);font-weight:640;margin-top:9px;display:inline-block}
  .macro{display:flex;gap:9px}
  .macro .m{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:13px;padding:11px;text-align:center}
  .macro .m b{display:block;font-size:1.25rem;font-weight:720;font-variant-numeric:tabular-nums}
  .macro .m span{font-size:.62rem;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em}
  .bar{height:7px;border-radius:99px;background:var(--panel-2);overflow:hidden;margin-top:8px}
  .bar i{display:block;height:100%;border-radius:99px;transition:width .4s}
  .ruleline{display:flex;gap:10px;padding:11px 0;border-top:1px solid var(--line);align-items:flex-start}
  .ruleline:first-child{border-top:none}
  .ruleline .k{flex:none;width:54px;font-weight:720;color:var(--moss);font-size:.95rem;font-variant-numeric:tabular-nums}
  .ruleline.lo .k{color:var(--clay)}
  .swap{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-top:1px solid var(--line)}
  .swap:first-child{border-top:none}.swap .no{color:var(--ink-dim)}.swap .yes{color:var(--ink);font-weight:620;text-align:right}
  .dots{display:flex;gap:6px;flex-wrap:wrap}
  .dot{width:13px;height:13px;border-radius:4px;background:var(--panel-2);border:1px solid var(--line)}
  .dot.done{background:var(--moss);border-color:transparent}.dot.rest{border-color:var(--moss-deep)}
  .noise{background:linear-gradient(135deg,#222a1e,#1b2118);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:12px 0}
  .noise b{color:var(--moss)}
  .field{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:11px 12px;font-size:.95rem;margin-top:6px}
  .field:focus{outline:2px solid var(--moss-deep);border-color:transparent}
  label.lab{font-size:.78rem;color:var(--ink-dim);font-weight:600}
  .split2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.split3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  a{color:var(--moss)}
  .seg{display:flex;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px}
  .seg button{flex:1;padding:9px;border-radius:9px;font-size:.85rem;font-weight:640;color:var(--ink-dim)}
  .seg button.on{background:var(--moss);color:#16210a}
  .hr{height:1px;background:var(--line);margin:14px 0}
  details summary{cursor:pointer;font-weight:640;list-style:none}details summary::-webkit-details-marker{display:none}
  details summary::after{content:"  +";color:var(--moss);float:right}details[open] summary::after{content:"  –"}
  .toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(20px);background:var(--moss);color:#16210a;
    font-weight:680;padding:11px 18px;border-radius:13px;font-size:.9rem;opacity:0;pointer-events:none;transition:.25s;z-index:60;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .verdict{border-radius:14px;padding:14px;margin-top:12px;font-size:.9rem;line-height:1.5}
  .verdict.good{background:rgba(159,194,79,.12);border:1px solid var(--moss-deep)}
  .verdict.watch{background:rgba(217,138,85,.12);border:1px solid var(--clay)}
  .verdict.neutral{background:var(--panel-2);border:1px solid var(--line)}
  .verdict b{color:var(--ink)}
  .spark{width:100%;height:90px;margin-top:8px}
  .legend{display:flex;gap:14px;font-size:.72rem;color:var(--ink-faint);margin-top:6px}
  .legend i{display:inline-block;width:10px;height:3px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .milestone{display:flex;justify-content:space-between;padding:9px 0;border-top:1px solid var(--line);font-size:.86rem}
  .milestone:first-child{border-top:none}.milestone b{font-variant-numeric:tabular-nums}
  .empty{color:var(--ink-faint);font-size:.82rem;text-align:center;padding:18px 6px;line-height:1.5}
</style>
</head>
<body>
<header><div class="wrap brandrow">
  <div class="brand display">Steady<span class="leaf"> ·</span></div>
  <div class="datechip" id="dateChip"></div>
</div></header>

<main class="wrap">
<!-- TODAY -->
<section class="view on" id="v-today"></section>
<!-- TRAIN -->
<section class="view" id="v-train"></section>
<!-- FOOD -->
<section class="view" id="v-food"></section>
<!-- PROGRESS -->
<section class="view" id="v-progress"></section>
<!-- PLAN -->
<section class="view" id="v-plan"></section>
</main>

<nav><div class="navin">
  <button class="nav-btn on" id="n-today" onclick="go('today')"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg>Today</button>
  <button class="nav-btn" id="n-train" onclick="go('train')"><svg viewBox="0 0 24 24"><path d="M6 8v8M18 8v8M4 10v4M20 10v4M7 12h10"/></svg>Train</button>
  <button class="nav-btn" id="n-food" onclick="go('food')"><svg viewBox="0 0 24 24"><path d="M5 3v8a3 3 0 006 0V3M8 3v18M16 3c-1.5 1-2 3-2 6s.5 4 2 4v8"/></svg>Food</button>
  <button class="nav-btn" id="n-progress" onclick="go('progress')"><svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16M8 16l3-5 3 3 4-7"/></svg>Progress</button>
  <button class="nav-btn" id="n-plan" onclick="go('plan')"><svg viewBox="0 0 24 24"><path d="M4 5h16M4 12h16M4 19h10"/></svg>Plan</button>
</div></nav>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   STEADY — data model
   ========================================================= */
const KEY='steady_v3';
const todayStr=()=>new Date().toISOString().slice(0,10);

/* Your real logged bests (from the app you exported) — carried in as the starting reference
   so progression nudges work from day one and you can dial DOWN for the restart. */
const SEED={
  aha3o:[{t:40},{t:40},{t:40},{t:40}],
  '88gwk':[{t:45,w:30},{t:45,w:30},{t:45,w:30},{t:45,w:30}],
  v5pfu:[{t:30},{t:30},{t:30},{t:30}],
  wi2ge:[{w:85,r:8},{w:85,r:8},{w:85,r:8},{w:85,r:8}],
  '06f51':[{w:90,r:10},{w:100,r:10},{w:90,r:10},{w:90,r:10}],
  w2vqh:[{w:30,r:10},{w:30,r:10},{w:30,r:10},{w:35,r:10}],
  lyvib:[{w:60,r:10},{w:70,r:10},{w:70,r:10},{w:85,r:9}],
  '1lalp':[{w:90,r:10},{w:90,r:10},{w:135,r:8},{w:135,r:8}],
  '575mf':[{w:55,r:10},{w:60,r:10},{w:60,r:10},{w:60,r:10}],
  '13goy':[{w:20,r:10},{w:20,r:10},{w:20,r:10}],
  el6wc:[{w:20,r:15},{w:30,r:12},{w:30,r:12},{w:30,r:15}],
  '0mqs8':[{w:95,r:8},{w:95,r:6},{w:95,r:6},{w:95,r:6}],
  pghuz:[{w:115,r:12},{w:115,r:12},{w:120,r:12}],
  yxv0x:[{w:65,r:11},{w:75,r:10},{w:75,r:10},{w:75,r:10}]
};
const SEED_DATE='2026-06-19'; // your last real session block

const defaults=()=>({
  start:'2026-04-25', weight:143, height:64, ratio:0.79, sugarCap:40,  // real program start + last bodyweight
  log:{},                 // date -> {knee, sessionDone, day, protein, meals, sugar, veg, water}
  sets:{},                // exId -> { 'YYYY-MM-DD': [ {w,r} | {r} | {t} ... ] }
  body:[{date:'2026-05-16',weight:143,waist:null}], // your logged bodyweight
  miles:{pushup:null, plank:null},
  ext:[],                 // external exercise log: [{date, kind, min, effort}]
  grease:{date:todayStr(), n:0},
  seeded:false,
  curDay:'A'
});
let S=load();
function load(){try{const r=JSON.parse(localStorage.getItem(KEY));return r&&r.start?Object.assign(defaults(),r):defaults();}catch(e){return defaults();}}
/* one-time: drop your real bests in as the "previous session" reference,
   mapped from your old exercise IDs onto the new A/B/C exercise keys. */
function seedHistory(){
  if(S.seeded)return;
  Object.keys(EX).forEach(k=>{
    const oldId=EX[k].seed;
    if(oldId&&SEED[oldId]){ if(!S.sets[k])S.sets[k]={}; S.sets[k][SEED_DATE]=SEED[oldId]; }
  });
  S.seeded=true; save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
function day(){const d=todayStr();if(!S.log[d])S.log[d]={knee:null,sessionDone:false,day:S.curDay,protein:0,meals:0,sugar:0,veg:0,water:0};return S.log[d];}

/* =========================================================
   EXERCISE DATABASE — coaching detail per movement
   metric: 'wr'=weight+reps · 'reps' · 'time'(sec) · 'side'(reps/side) · 'leg'(reps/leg) · 'timeside'
   ========================================================= */
/* Personalized A/B/C rotation. Keeps your posterior-chain bias (pull>push) and a knee-load
   in EVERY session, using solid repeated compounds (strength is a skill). 'seed' carries your
   real logged weights in as the first "last time" so progression starts from where you were. */
const EX={
  /* ---- knee primers (isometric, one per session, rotated angle) ---- */
  spanish:{name:'Spanish Squat / Wall Sit (isometric)',metric:'time',sets:4,tag:'knee',
    targets:'Patellar tendon (loading), VMO, quads, glutes',rest:'30–45 sec between holds',
    tempo:'Hold at ~90° knee angle, still and braced',
    cue:'Band behind knees or back to wall, shin roughly vertical, push steadily — no bouncing.',
    goal:'Frontline HSR treatment for your jumper\'s knee — isometric holds have an analgesic effect for ~45 min and prime the tendon for the session. Your knee sitting at ~1/10 says this is working.',
    progress:'You were at 40 sec. Rebuild to 40, then add 5 sec per block; later add a light band or vest. Keep pain ≤3/10.',
    seed:'aha3o'},
  wallsit:{name:'Heavy Wall Sit (weighted isometric)',metric:'timewt',sets:4,tag:'knee',
    targets:'Patellar tendon (compressive load), quads, VMO, glutes',rest:'30 sec',
    tempo:'45-sec hold, plate on the quads',
    cue:'Knees ~90°, back flat on wall, weight plate resting on thighs. Breathe.',
    goal:'Alternate isometric angle to the Spanish squat. The added plate raises compressive load — the exact mechanism of HSR tendon adaptation. You worked up to +30 lb.',
    progress:'Restart around +20–25 lb, rebuild to +30, then +35 or 60-sec holds.',
    seed:'88gwk'},
  sissy:{name:'Sissy / Decline Squat hold (isometric)',metric:'time',sets:4,tag:'knee',
    targets:'Patellar tendon (high knee-angle load), rectus femoris, VMO',rest:'30 sec',
    tempo:'30–40 sec hold at the bottom',
    cue:'Hold a rail for balance, lean back through the knees. Loads the tendon at a higher angle than the Spanish squat.',
    goal:'Covers the mid-tendon at a steeper knee angle — rotating the angle across sessions gives full tendon coverage. You held 30 sec cleanly at 1–2/10 pain.',
    progress:'Rebuild to 30 sec, add 5 sec per block only while pain stays 0–2/10. A 25° decline board is the clinical progression.',
    seed:'v5pfu'},
  /* ---- A: hinge focus ---- */
  rdl:{name:'Romanian Deadlift',metric:'wr',sets:4,tag:'pull',
    targets:'Hamstrings, glutes; erectors + lats bracing',rest:'90 sec',tempo:'3s lower, 1s pause at stretch, 2s up',
    cue:'Hinge like closing a door with your hips, bar close to legs, flat back, ~15° knee bend.',
    goal:'Core posterior-chain movement — counters glute shutdown from driving and builds the hip-hinge endurance your production-floor shifts demand. Knee-friendly.',
    progress:'You held 85 lb for 4×8. After the break, restart ~65–75 and earn 85 back over 1–2 sessions, then add 5 lb when all 4×8 are clean.',
    seed:'wi2ge',compositeChart:true},
  pulldown:{name:'Lat Pulldown (wide) / Assisted Pull-up',metric:'wr',sets:4,tag:'pull',
    targets:'Lats, teres major, biceps, rear delts',rest:'75 sec',tempo:'2s pull, 1s hold at chest, 3s return',
    cue:'Full scapular depression + retraction at the bottom — drive elbows down, not a bicep curl.',
    goal:'Vertical pull for upright-posture endurance under fatigue. Part of the more-pulling-than-pushing bias that offsets all-day driving.',
    progress:'You worked around 90–100 lb for 3–4×10. Add 5 lb when all sets hit cleanly.',
    seed:'06f51'},
  bench:{name:'Dumbbell Bench Press',metric:'wr',sets:4,tag:'push',
    targets:'Pecs, anterior delts, triceps',rest:'75 sec',tempo:'3s lower, 1s at chest, 2s press',
    cue:'Shoulder blades back and down, wrists over elbows, controlled bottom.',
    goal:'Balanced push kept to ~1 push per 2 pulls to preserve the posterior bias. Your main horizontal press.',
    progress:'You hit 35 lb/hand for 4×10. Rebuild to 30, then back to 35, then +2.5–5 lb per DB.',
    seed:'w2vqh'},
  row:{name:'Seated Cable Row (neutral)',metric:'wr',sets:4,tag:'pull',
    targets:'Mid traps, rhomboids, lats; rear delts, biceps',rest:'75 sec',tempo:'2s pull, 1s squeeze, 3s slow return',
    cue:'Chest tall, pull to the navel, squeeze shoulder blades — don\'t round forward.',
    goal:'Horizontal pull that directly counteracts rounded-shoulder driving posture. The 3s eccentric is the priority over load.',
    progress:'You reached ~60–70 lb for 4×10. Add 5 lb only once the slow return is controlled on every rep.',
    seed:'lyvib'},
  plank:{name:'Plank',metric:'time',sets:3,tag:'core',
    targets:'Deep core (transverse abdominis), shoulders',rest:'45–60 sec',tempo:'Hold, breathe steadily',
    cue:'Forearms down, ribs tucked, squeeze glutes, straight line ear-to-heel.',
    goal:'Deep bracing core that protects the spine your job strains and underlies visible abs.',
    progress:'Add 5–10 sec when you can hold with no hip sag; past ~60 sec add a long lever or light plate.'},
  /* ---- B: glute / knee focus ---- */
  hipthrust:{name:'Hip Thrust',metric:'wr',sets:4,tag:'pull',
    targets:'Glutes (max); hamstrings, core brace',rest:'90 sec',tempo:'2s up, 2s squeeze at top, 2s down',
    cue:'Drive through heels, ribs down, 2-sec squeeze at the top — that pause is where the adaptation is. Zero knee shear.',
    goal:'Best glute-activation lift to reverse the "gluteal amnesia" from prolonged sitting, and completely knee-safe for the tendon. Your standout lift — you jumped 90→135.',
    progress:'You hit 135 for reps. Rebuild ~115, back to 135, then +10 lb per block. Never skip the 2-sec squeeze.',
    seed:'1lalp',compositeChart:true},
  legcurl:{name:'Seated Leg Curl',metric:'wr',sets:4,tag:'knee',
    targets:'Hamstrings (biceps femoris, semimembranosus); calves',rest:'90 sec',tempo:'2s curl, 1s peak, 3s eccentric',
    cue:'Seated (hip at 90°) loads the distal hamstring. Control the 3s return — that\'s where remodeling happens.',
    goal:'Strong hamstrings act as functional support for the patellar tendon — a key knee-stability piece. HSR tempo applies.',
    progress:'You reached 60 lb for 4×10. Add 5 lb only without sacrificing the 3s eccentric.',
    seed:'575mf'},
  ohp:{name:'Dumbbell Overhead Press',metric:'wr',sets:3,tag:'push',
    targets:'Medial + anterior delts; triceps, core stability',rest:'75 sec',tempo:'2s press, 1s top, 3s lower',
    cue:'Standing, brace core + glutes hard — this trains the postural bracing your standing shifts need.',
    goal:'The only real overhead push; standing version doubles as spinal-erector endurance work. Drop to seated if the low back fatigues.',
    progress:'You were at 20–25 lb/hand. Rebuild to 20, then +2.5 lb per DB per block.',
    seed:'13goy'},
  facepull:{name:'Cable Face Pull',metric:'wr',sets:4,tag:'pull',
    targets:'Rear delts, external rotators; mid/lower traps',rest:'75 sec',tempo:'Pull to forehead, 2s hold at peak',
    cue:'Elbows high, light weight, squeeze the rear delts. Quality of external rotation is the metric, not load.',
    goal:'Counteracts forward-head, internally-rotated driving posture — critical for shoulder health under fatigue.',
    progress:'Keep it light (you used ~20–30 lb). Progress by adding a rep, not weight.',
    seed:'el6wc'},
  deadbug:{name:'Dead Bug',metric:'side',sets:3,tag:'core',
    targets:'Deep core, anti-extension control',rest:'45 sec',tempo:'Extend over 3s, control back',

/* =========================================================

   ========================================================= */
function weekNo(){return Math.floor((new Date(todayStr())-new Date(S.start))/6048e5)+1;}
function isDeload(){return weekNo()%4===0;}
function lastCompletedDate(){
  const ds=Object.keys(S.log).filter(d=>S.log[d].sessionDone).sort();
  return ds.length?ds[ds.length-1]:null;
}
function daysSinceLast(){
  const last=lastCompletedDate()||SEED_DATE; // fall back to your last real session
  return Math.floor((new Date(todayStr())-new Date(last))/864e5);
}
function inReboot(){return daysSinceLast()>=10;} // 10+ days off → ease back in
function phase(){const w=weekNo();
  if(inReboot())return{n:0,name:'Reboot',reps:'8–10',focus:'Coming back from a break. First 1–2 sessions at ~85% of your old weights, full tempo, then resume.'};
  if(w<=12)return{n:2,name:'Build',reps:'6–8',focus:'Heavier, lower reps. Progressive overload in earnest.'};
  return{n:3,name:'Reveal',reps:'6–10',focus:'Hold strength through the mild deficit while definition appears.'};}

}

/* =========================================================
   TRAIN — logging + coaching + last-time + auto progression
   ========================================================= */
function pickDay(dd){S.curDay=dd;day().day=dd;save();renderTrain();}
function lastEntry(exId){const h=S.sets[exId];if(!h)return null;const ds=Object.keys(h).filter(d=>d!==todayStr()).sort();if(!ds.length)return null;return{date:ds[ds.length-1],sets:h[ds[ds.length-1]]};}
function fmtSet(s,metric){
  if(metric==='wr')return (s.w||s.w===0?s.w:'–')+(s.w!==undefined&&s.w!==''?' lb':'')+' × '+(s.r??'–');
  if(metric==='timewt')return (s.t??'–')+' sec'+(s.w?' +'+s.w+'lb':'');
  if(metric==='reps')return (s.r??'–')+' reps';
  if(metric==='time')return (s.t??'–')+' sec';
  if(metric==='side')return (s.r??'–')+' /side';
  if(metric==='leg')return (s.r??'–')+' /leg';
  return JSON.stringify(s);
}
function progNudge(exId,metric){
  const last=lastEntry(exId);if(!last)return 'First time — log your sets and Steady remembers them for next session.';
  if(inReboot()){
    if(metric==='wr'){const best=Math.max(...last.sets.map(s=>+s.w||0));return `Back from a break — start around ${Math.round(best*0.85/2.5)*2.5} lb (~85% of your ${best}) and build back up.`;}
    if(metric==='time'){const best=Math.max(...last.sets.map(s=>+s.t||0));return `Ease in — aim ~${Math.round(best*0.85)} sec (about 85% of your ${best}), rebuild from there.`;}
    const best=Math.max(...last.sets.map(s=>+s.r||0));return `Ease back — a few reps short of your ${best} is right for the first session back.`;
  }
  if(metric==='wr'){
    const reps=last.sets.map(s=>+s.r||0), allHigh=reps.every(r=>r>=8);
    if(allHigh)return 'You hit the rep range last time — add ~2.5–5 lb this session.';
    return 'Match or beat last time: add a rep on each set before adding weight.';
  }
  if(metric==='time'||metric==='timewt'){const best=Math.max(...last.sets.map(s=>+s.t||0));return `Last best hold: ${best} sec. Add 5–10 sec if it felt solid.`;}
  const best=Math.max(...last.sets.map(s=>+s.r||0));return `Last best: ${best}. Add a rep where you can keep good form.`;
}
function renderTrain(){
  const dd=S.curDay, ph=phase(), ids=PROG[dd];
  let cards='';
  ids.forEach((id,i)=>cards+=exCard(id, i===0 && EX[id].tag==='knee'));
  const rebootNote=inReboot()?`<div class="verdict watch" style="margin-top:0;margin-bottom:12px">Coming back after ${daysSinceLast()} days. Each lift below shows a suggested ~85% restart weight from your real history. Full tempo, keep knee pain ≤3/10 — you'll be back to your June numbers fast.</div>`:'';
  document.getElementById('v-train').innerHTML=`

  ids.forEach(id=>hydrate(id));
}
function sessionLabel(dd){return {A:'Hinge + pulls',B:'Glutes + knee',C:'Heavy + erectors'}[dd]||'';}
function exCard(id,isIso){
  const ex=EX[id], badge=ex.tag?`<span class="badge ${ex.tag}">${ex.tag==='knee'?'knee-safe':ex.tag}</span>`:'';
  const last=lastEntry(id);
  const lastHtml=last
    ? `<div class="lastbar">Last time · <span class="dim">${last.date.slice(5)}</span> &nbsp;<b>${last.sets.map(s=>fmtSet(s,ex.metric)).join(' · ')}</b>
        <span class="nudge">${progNudge(id,ex.metric)}</span></div>`
    : `<div class="lastbar dim">${progNudge(id,ex.metric)}</div>`;
  const unit={wr:'',time:'sec',reps:'reps',side:'/side',leg:'/leg'}[ex.metric];
  return `<div class="card${isIso?'':''}"${isIso?' style="border-color:rgba(217,138,85,.4)"':''}>

    </div></div>`;
}
function toggleCoach(id){document.getElementById('coach-'+id).classList.toggle('open');}
function hydrate(id){
  const ex=EX[id], host=document.getElementById('sets-'+id);if(!host)return;
  const today=S.sets[id]&&S.sets[id][todayStr()]?S.sets[id][todayStr()]:[];
  host.innerHTML='';
  for(let i=0;i<ex.sets;i++){
    const cur=today[i]||{};
    const line=document.createElement('div');line.className='setline';
    let inner=`<div class="lbl">Set ${i+1}</div>`;
    if(ex.metric==='wr'){
      inner+=`<input class="ipt" type="number" inputmode="decimal" placeholder="lb" value="${cur.w??''}" oninput="setVal('${id}',${i},'w',this.value)">
              <input class="ipt" type="number" inputmode="numeric" placeholder="reps" value="${cur.r??''}" oninput="setVal('${id}',${i},'r',this.value)">`;
    } else if(ex.metric==='timewt'){
      inner+=`<input class="ipt" type="number" inputmode="numeric" placeholder="sec" value="${cur.t??''}" oninput="setVal('${id}',${i},'t',this.value)"><div class="unit">sec</div>
              <input class="ipt" type="number" inputmode="decimal" placeholder="+lb" value="${cur.w??''}" oninput="setVal('${id}',${i},'w',this.value)"><div class="unit">lb</div>`;
    } else if(ex.metric==='time'){
      inner+=`<input class="ipt" type="number" inputmode="numeric" placeholder="seconds" value="${cur.t??''}" oninput="setVal('${id}',${i},'t',this.value)"><div class="unit">sec</div>`;
    } else {
      const u=ex.metric==='side'?'/side':ex.metric==='leg'?'/leg':'reps';
      inner+=`<input class="ipt" type="number" inputmode="numeric" placeholder="reps" value="${cur.r??''}" oninput="setVal('${id}',${i},'r',this.value)"><div class="unit">${u}</div>`;
    }
    line.innerHTML=inner;host.appendChild(line);
  }
}
function setVal(id,i,field,val){
  if(!S.sets[id])S.sets[id]={};
  const d=todayStr();if(!S.sets[id][d])S.sets[id][d]=[];
  if(!S.sets[id][d][i])S.sets[id][d][i]={};
  S.sets[id][d][i][field]=val===''?undefined:(+val);
  save();
}
function finishSession(){
  day().sessionDone=true;day().day=S.curDay;
  // advance rotation for next time: A→B→C→A
  const i=ORDER.indexOf(S.curDay); S.curDay=ORDER[(i+1)%ORDER.length];
  save();toast('Session logged ✓ — next up: '+S.curDay);go('today');
}

function addP(g){const d=day();d.protein+=g;d.meals+=1;save();renderFood();toast(g?'+'+g+' g protein':'Meal logged');}
function addSugar(g,reset){const d=day();if(reset){d.sugar=0;}else d.sugar+=g;save();renderFood();if(!reset)toast('+'+g+' g sugar');}
function bump(k,n){const d=day();d[k]=Math.max(0,d[k]+n);save();renderFood();}

/* =========================================================
   PROGRESS — the "is it working?" engine
   ========================================================= */
function trendArrow(arr){ // returns -1 down, 0 flat, 1 up using first vs last avg
  if(arr.length<2)return 0;
  const a=arr[0], b=arr[arr.length-1], diff=b-a;
  const thresh=Math.abs(a)*0.01; // ~1% noise band
  if(diff<-thresh)return -1; if(diff>thresh)return 1; return 0;
}
function renderProgress(){
  const body=S.body.slice().sort((a,b)=>a.date<b.date?-1:1);
  const weights=body.filter(b=>b.weight).map(b=>b.weight);
  const waists=body.filter(b=>b.waist).map(b=>b.waist);
  const wT=trendArrow(weights), waT=trendArrow(waists);
  // verdict matrix (Q3)
  let vClass='neutral', vText='Log weight and waist a few times (every 1–2 weeks) and Steady will read the trend for you. One reading isn\'t a trend — give it time.';
  if(weights.length>=2&&waists.length>=2){
    if(waT<0&&wT<0){vClass='good';vText='<b>Fat loss.</b> Weight and waist both trending down — exactly what you want. Keep the protein up so it stays fat, not muscle.';}
    else if(waT<0&&wT===0){vClass='good';vText='<b>Recomposition.</b> Waist shrinking while weight holds = losing fat <i>and</i> building muscle at once. This is the dream outcome for where you are. The scale "lying" here is good news.';}
    else if(waT<0&&wT>0){vClass='good';vText='<b>Muscle gain with fat loss.</b> Waist down, weight up — you\'re adding muscle. Great for strength; if the look is the priority, keep the deficit mild.';}
    else if(waT===0&&wT<0){vClass='watch';vText='<b>Worth a look.</b> Weight down but waist flat can mean some muscle loss. Make sure you\'re hitting protein (~'+pGoal()+' g) and not cutting too hard.';}
    else if(waT>0){vClass='watch';vText='<b>Waist trending up.</b> Likely a slightly loose week or higher sodium/carbs (water). Tighten the mild deficit and recheck in 1–2 weeks before changing anything.';}
    else {vClass='neutral';vText='<b>Holding steady.</b> No clear trend yet — normal early on. Water retention masks fat loss for the first 2–3 weeks; judge by 4-week trends.';}
  }
  // external conditioning influences the fat-loss side of the verdict
  const wk=extWeekMin();
  if(wk>=90 && (vClass==='watch'&&/waist trending up|Worth a look/i.test(vText)===false)){
    vText+=` <span style="color:var(--sky)">You've logged ${wk} min of cardio this week — that's actively helping the fat-loss side.</span>`;
  } else if(wk>=90){
    vText+=` <span style="color:var(--sky)">${wk} min of cardio this week is supporting your deficit.</span>`;
  } else if(wk>0 && weights.length>=2){
    vText+=` <span class="faint">Only ${wk} cardio min this week — a couple of swims or rides would nudge fat loss along.</span>`;
  }
  // waist-to-height
  let whtr='';
  if(waists.length){const last=waists[waists.length-1];const r=(last/S.height);
    whtr=`<div class="milestone"><span>Waist-to-height ratio</span><b>${r.toFixed(2)} ${r<0.5?'· in range ✓':'· aim <0.50'}</b></div>`;}
  // strength: total volume trend across all wr exercises
  const volSeries=strengthVolumeSeries();
  // milestones
  const m=S.miles;
  document.getElementById('v-progress').innerHTML=`
   <div class="card">
     <div class="eyebrow">Is it working?</div>
     <div class="verdict ${vClass}">${vText}</div>
     <div class="legend" style="margin-top:12px">
       <span>Weight ${arrowGlyph(wT)}</span><span>Waist ${arrowGlyph(waT)}</span>
       <span class="faint">${body.length} check-in${body.length===1?'':'s'}</span></div>
     ${sparkline(weights,'#eef2e6','Weight (lb)')}
     ${sparkline(waists,'#7fb0c4','Waist (in)')}
   </div>

   <div class="card">
     <div class="eyebrow">Log a check-in</div>
     <p class="tiny dim" style="margin:7px 0 0">Weigh in the morning. Measure the waist at the belly button after a normal breath out. Every 1–2 weeks is plenty — trends matter, not single days.</p>
     <div class="split2" style="margin-top:12px">
       <div><label class="lab">Weight (lb)</label><input class="field" id="inW" type="number" inputmode="decimal" placeholder="${S.weight}"></div>
       <div><label class="lab">Waist (in)</label><input class="field" id="inWa" type="number" inputmode="decimal" placeholder="e.g. 33"></div></div>
     <button class="btn mini" style="width:100%;margin-top:11px" onclick="logBody()">Save check-in</button>
     ${whtr?`<div style="margin-top:12px">${whtr}</div>`:''}
   </div>

   <div class="card">
     <div class="eyebrow">Strength is progress too</div>
     <p class="tiny dim" style="margin:7px 0 0">Total weekly lifting volume (weight × reps). This climbs even when the scale is flat — proof the work is paying off.</p>
     ${volSeries.vals.length>=2
        ? sparkline(volSeries.vals,'#9fc24f','Volume (lb)')+`<p class="tiny faint" style="margin:8px 0 0">${volSeries.first} → ${volSeries.last} lb over ${volSeries.vals.length} sessions logged${volSeries.last>volSeries.first?' · trending up ✓':''}.</p>`
        : `<div class="empty">Log a few training sessions and your strength curve appears here automatically.</div>`}
   </div>

   <div class="card">
     <div class="eyebrow">Functional milestones</div>
     <div class="milestone"><span>Max push-ups (one set)</span><b>${m.pushup??'—'}</b></div>
     <div class="milestone"><span>Longest plank</span><b>${m.plank?m.plank+' sec':'—'}</b></div>
     <p class="tiny dim" style="margin:11px 0 8px">Retest every 2–4 weeks. These are non-scale victories that show real change.</p>
     <div class="split2">
       <div><label class="lab">Push-up max</label><input class="field" id="inPu" type="number" inputmode="numeric" placeholder="${m.pushup??'reps'}"></div>
       <div><label class="lab">Plank (sec)</label><input class="field" id="inPl" type="number" inputmode="numeric" placeholder="${m.plank??'sec'}"></div></div>
     <button class="btn ghost mini" style="width:100%;margin-top:11px" onclick="logMiles()">Save milestones</button>
   </div>

   <div class="card">
     <div class="eyebrow">Outside the gym</div>
     <p class="tiny dim" style="margin:7px 0 0">Swimming, pickleball, cycling — this counts. It supports the fat-loss side of recomp and keeps the knee moving. ${extWeekMin()} min logged in the last 7 days.</p>
     <div class="bar"><i style="width:${Math.min(100,Math.round(extWeekMin()/150*100))}%;background:var(--sky)"></i></div>
     <p class="tiny faint" style="margin:6px 0 0">~150 min/week of easy cardio is a great target.</p>
     ${extKneeFlag()}
     <div class="split3" style="margin-top:12px">
       <button class="chip" onclick="setExtKind('Swim')" id="ek-Swim">Swim</button>
       <button class="chip" onclick="setExtKind('Pickleball')" id="ek-Pickleball">Pickleball</button>
       <button class="chip" onclick="setExtKind('Cycle')" id="ek-Cycle">Cycle</button></div>
     <div class="split2" style="margin-top:10px">
       <div><label class="lab">Minutes</label><input class="field" id="exMin" type="number" inputmode="numeric" placeholder="30"></div>
       <div><label class="lab">Effort</label>
         <div class="seg" id="exEffort" style="margin-top:6px">
           <button onclick="setExtEffort('easy')" data-e="easy">Easy</button>
           <button onclick="setExtEffort('mod')" data-e="mod">Mod</button>
           <button onclick="setExtEffort('hard')" data-e="hard">Hard</button></div></div></div>
     <button class="btn ghost mini" style="width:100%;margin-top:11px" onclick="logExt()">Log activity</button>
     ${extRecentList()}
   </div>

   <div class="card card-tight"><p class="tiny dim" style="line-height:1.5">Heads-up: new training adds 2–5 lb of water that <b style="color:var(--ink)">masks fat loss</b> for 2–3 weeks. Beginners gain strength fastest early (10–15% in 3 weeks). Read the 4-week trend, not the daily scale.</p></div>`;
}
function arrowGlyph(t){return t<0?'↓':t>0?'↑':'→';}
function logBody(){
  const w=parseFloat(document.getElementById('inW').value), wa=parseFloat(document.getElementById('inWa').value);
  if(!w&&!wa){toast('Enter a number');return;}
  const d=todayStr(), ex=S.body.find(b=>b.date===d);
  if(ex){if(w)ex.weight=w;if(wa)ex.waist=wa;}else S.body.push({date:d,weight:w||null,waist:wa||null});
  if(w)S.weight=w;save();renderProgress();toast('Check-in saved');
}
function logMiles(){
  const pu=parseInt(document.getElementById('inPu').value), pl=parseInt(document.getElementById('inPl').value);
  if(pu)S.miles.pushup=pu; if(pl)S.miles.plank=pl; save();renderProgress();toast('Milestones saved');
}
/* ---- external exercise log ---- */
let _extKind='Swim', _extEffort='easy';
function setExtKind(k){_extKind=k;['Swim','Pickleball','Cycle'].forEach(x=>{const b=document.getElementById('ek-'+x);if(b)b.classList.toggle('on',x===k);});}
function setExtEffort(e){_extEffort=e;const seg=document.getElementById('exEffort');if(seg)[...seg.children].forEach(b=>b.classList.toggle('on',b.dataset.e===e));}
function logExt(){
  const min=parseInt(document.getElementById('exMin').value);
  if(!min||min<=0){toast('Enter minutes');return;}
  S.ext.push({date:todayStr(),kind:_extKind,min,effort:_extEffort});save();renderProgress();toast(_extKind+' logged');
}
function extWeekMin(){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
  return S.ext.filter(e=>new Date(e.date)>=cutoff).reduce((a,e)=>a+e.min,0);
}
function extKneeFlag(){
  // knee-aware: recent hard pickleball near a flare gets a gentle note
  const recent=S.ext.slice(-5);
  const pick=recent.find(e=>e.kind==='Pickleball'&&e.effort==='hard');
  if(pick)return `<p class="tiny" style="margin:8px 0 0;color:var(--clay)">Note: hard pickleball involves lateral cutting that can provoke the patellar tendon — warm the knee up first and watch pain the next day.</p>`;
  const lowImpact=recent.filter(e=>e.kind==='Swim'||e.kind==='Cycle').length;
  if(lowImpact>=2)return `<p class="tiny" style="margin:8px 0 0;color:var(--moss)">Swimming and cycling are tendon-friendly — great choices for recovery days.</p>`;
  return '';
}
function extRecentList(){
  if(!S.ext.length)return '';
  const rows=S.ext.slice(-4).reverse().map(e=>`<div class="milestone"><span>${e.date.slice(5)} · ${e.kind}</span><b>${e.min} min · ${e.effort}</b></div>`).join('');
  return `<div style="margin-top:12px">${rows}</div>`;
}
function strengthVolumeSeries(){
  // sum weight*reps per date across all weight+rep exercises
  const byDate={};
  Object.keys(S.sets).forEach(id=>{if(EX[id]&&EX[id].metric==='wr'){
    Object.keys(S.sets[id]).forEach(d=>{
      let v=0;S.sets[id][d].forEach(s=>{if(s&&s.w&&s.r)v+=s.w*s.r;});
      byDate[d]=(byDate[d]||0)+v;});
  }});
  const ds=Object.keys(byDate).sort(), vals=ds.map(d=>Math.round(byDate[d])).filter(v=>v>0);
  return{vals,first:vals[0]||0,last:vals[vals.length-1]||0};
}
function sparkline(vals,color,label){
  if(!vals||!vals.length)return `<div class="empty">No ${label.toLowerCase()} logged yet.</div>`;
  if(vals.length===1)return `<p class="tiny faint" style="margin:8px 0 0">${label}: <b style="color:${color}">${vals[0]}</b> · one point so far — log again to see a trend.</p>`;
  const W=480,H=80,pad=6,min=Math.min(...vals),max=Math.max(...vals),span=(max-min)||1;
  const pts=vals.map((v,i)=>[pad+i*(W-2*pad)/(vals.length-1), H-pad-(v-min)/span*(H-2*pad)]);
  const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const last=pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
     <path d="${path}" fill="none" stroke="${color}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
     <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.5" fill="${color}"/>
   </svg>
   <p class="tiny faint" style="margin:2px 0 0">${label}: ${vals[0]} → <b style="color:${color}">${vals[vals.length-1]}</b></p>`;
}

/* =========================================================
   PLAN
   ========================================================= */
function renderPlan(){
  const ph=phase();
  document.getElementById('v-plan').innerHTML=`
   <div class="card"><div class="eyebrow">Your program</div>
     <p class="tiny dim" style="margin:7px 0 0">Goal: ~12% body fat with real strength. <b style="color:var(--ink)">3-session A/B/C rotation</b>, full-body, posterior-chain biased (more pulling than pushing to counter all-day driving/standing), with a knee primer every session. The rotation is deliberate: if you miss a day, the next session just continues — no muscle group gets zeroed out for the week. Movements stay stable so you master them and can track progress; the <i>weights</i> climb.</p>
     <div style="margin-top:14px">
       <div class="ex" style="border-top:none"><div class="row between"><h3>Session A · Hinge + pulls</h3></div>
         <p class="meta" style="margin-top:4px">Spanish squat primer, RDL, lat pulldown, DB bench, cable row, plank.</p></div>
       <div class="ex"><div class="row between"><h3>Session B · Glutes + knee</h3></div>
         <p class="meta" style="margin-top:4px">Weighted wall sit, hip thrust, leg curl, overhead press, face pull, dead bug.</p></div>
       <div class="ex"><div class="row between"><h3>Session C · Heavy + erectors</h3></div>
         <p class="meta" style="margin-top:4px">Sissy-squat hold, trap-bar deadlift, leg press, barbell row, Pallof press.</p></div>
     </div>
     <p class="tiny faint" style="margin:11px 0 0">Ported from the program you were already running — knee rehab and posterior bias kept, exercise churn trimmed. Your real logged weights are loaded in as each lift's starting reference.</p></div>

   <div class="card"><div class="eyebrow">Where you are right now</div>
     <p class="tiny dim" style="margin:8px 0 0;line-height:1.6">You trained ~5 weeks (10 sessions) with your knee holding at ~1/10 — the HSR rehab is working. After a 2-week break you're in a short <b style="color:var(--ink)">restart</b>: first 1–2 sessions at ~85% of your old weights, full tempo, then straight back to progression. You were strongest on hip thrust (135) and trap-bar deadlift (95); RDL and rows are ready to climb again.</p></div>

   <div class="card"><div class="eyebrow">How progression works</div>
     <p class="tiny dim" style="margin:8px 0 0;line-height:1.6">Hit the top of the rep range with good form on every set → add ~2.5–5% load next session. Not yet? Add a rep first. Steady reads your last session and tells you which to do per exercise. Reps wobble as you adapt — that's why you log <b style="color:var(--ink)">both</b> weight and reps.</p></div>

   <div class="card"><div class="eyebrow">Conditioning (you do these — log them on Progress)</div>
     <p class="tiny dim" style="margin:8px 0 0;line-height:1.6"><b style="color:var(--ink)">Swimming and cycling</b> are tendon-friendly and support the fat-loss side of recomp — log them and they feed your progress readout. <b style="color:var(--ink)">Pickleball</b> is great cardio but involves lateral cutting; warm the knee first and watch next-day pain. Aim ~150 min/week total.</p></div>

   <div class="card"><div class="eyebrow">Log body data — it's your blind spot</div>
     <p class="tiny dim" style="margin:8px 0 0;line-height:1.6">You logged bodyweight twice and waist never, so fat-loss trend is currently invisible. Add a <b style="color:var(--ink)">waist measurement</b> on the Progress tab every 1–2 weeks — combined with weight it tells you whether you're losing fat, gaining muscle, or recomping. That's the single most useful thing you can start doing.</p></div>
   <div class="card"><div class="eyebrow">Grease the groove — push-ups</div>
     <p class="tiny dim" style="margin:8px 0 0;line-height:1.6">On non-gym days, 2–3 sets at ~60% of max (≈12 clean reps) spread through the day. Low fatigue, fast skill gain.</p>
     <button class="btn ghost mini" style="width:100%;margin-top:12px" onclick="grease()">Logged a GtG set ✓ <span class="faint" id="gct">${S.grease.date===todayStr()&&S.grease.n?'· '+S.grease.n+' today':''}</span></button></div>

   <div class="card"><div class="eyebrow">When motivation dips</div>
     <p class="tiny dim" style="margin:8px 0 0;line-height:1.6">Habit is the engine, and breaking it makes restarting hard — so the rule is <b style="color:var(--ink)">never fully stop</b>. Bad day? Warm-up + one lift still counts. Even deload weeks keep the knee holds and a walk going.</p></div>

   <div class="hr"></div>
   <div class="card card-tight"><div class="eyebrow">Your numbers</div>
     <div class="split2" style="margin-top:12px">
       <div><label class="lab">Weight (lb)</label><input class="field" id="setW" type="number" inputmode="decimal" value="${S.weight}"></div>
       <div><label class="lab">Height (in)</label><input class="field" id="setH" type="number" inputmode="decimal" value="${S.height}"></div></div>
     <div class="split2" style="margin-top:10px">
       <div><label class="lab">Protein g/lb</label><input class="field" id="setR" type="number" step="0.05" inputmode="decimal" value="${S.ratio}"></div>
       <div><label class="lab">Sugar gauge (g)</label><input class="field" id="setS" type="number" inputmode="numeric" value="${S.sugarCap}"></div></div>
     <button class="btn ghost mini" style="width:100%;margin-top:11px" onclick="saveNums()">Save</button></div>

   <div class="card card-tight"><div class="eyebrow">Backup your data</div>
     <p class="tiny dim" style="margin:7px 0 11px">Your logs live on this phone. Export a backup file now and then — then you can restore it if you switch phones or clear Safari.</p>
     <div class="split2">
       <button class="btn ghost mini" style="width:100%" onclick="exportData()">Export backup</button>
       <button class="btn ghost mini" style="width:100%" onclick="document.getElementById('importFile').click()">Import backup</button></div>
     <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importData(this)">
   </div>

   <p class="tiny faint" style="text-align:center;margin:18px 0 4px">Steady — built for one person, on purpose.<br>Strength for health. The look is a bonus.</p>`;
}
function grease(){if(S.grease.date!==todayStr())S.grease={date:todayStr(),n:0};S.grease.n++;save();const g=document.getElementById('gct');if(g)g.textContent='· '+S.grease.n+' today';toast('GtG set logged');}
function saveNums(){
  const w=parseFloat(document.getElementById('setW').value),h=parseFloat(document.getElementById('setH').value),
        r=parseFloat(document.getElementById('setR').value),s=parseInt(document.getElementById('setS').value);
  if(w>0)S.weight=w;if(h>0)S.height=h;if(r>0)S.ratio=r;if(s>0)S.sugarCap=s;save();toast('Saved');renderPlan();
}

/* ---------- backup: export / import ---------- */
function exportData(){
  try{
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='steady-backup-'+todayStr()+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast('Backup exported');
  }catch(e){toast('Export failed');}
}
function importData(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data||!data.start){toast('Not a Steady backup');return;}
      if(!confirm('Replace all current data with this backup? This cannot be undone.')){return;}
      S=Object.assign(defaults(),data); save();
      toast('Backup restored'); renderPlan();
    }catch(e){toast('Could not read file');}
    input.value='';
  };
  reader.readAsText(file);
}

/* ---------- toast + init ---------- */
let tT;function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>e.classList.remove('show'),1600);}
if(S.grease.date!==todayStr()){S.grease={date:todayStr(),n:0};save();}
seedHistory();
renderToday();

/* ---------- service worker (offline app) ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
